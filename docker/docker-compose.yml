services:
  api:
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    build: 
          context: .. 
          dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ../mlruns:/src/mlruns
    depends_on:
      - mlflow
  mlflow:
    build: 
          context: .. 
          dockerfile: docker/Dockerfile.mlflow
    ports:
      - "5000:5000"
    volumes:
      - ../mlflow.db:/src/mlflow.db
      - ../mlruns:/src/mlruns
  prefect:
    build: 
          context: .. 
          dockerfile: docker/Dockerfile.prefect
    ports:
      - "4200:4200"